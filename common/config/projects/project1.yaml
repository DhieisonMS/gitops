apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: project1
  namespace: argocd
spec:
  description: Projeto de aplicações do ambiente Staging
  
  clusterResourceWhitelist:
    - group: "*"
      kind: "namespace"

  sourceRepos:
    - teste-*
    - teste
  
  destinations:
    - namespace: "teste-dev"
      server: cluster-1
    - namespace: "teste-hml"
      server: cluster-1
    - namespace: "teste-prd"
      server: cluster-1